scenario_version: 0.1.0
scenario_id: conflict_free_parallelism_success
# M04.1 golden success: conflict-free parallelism (the positive control for the
# I-006 lease no-overlap invariant, complementing conflicting_leases_invalid).
#
# Two independent `release.promote_candidate` (RuntimeExecution) actions share one
# trace and run fully interleaved. Their write scopes are DISJOINT
# (act_promote_123 -> environment:staging + release_candidate:rc_123;
#  act_promote_456 -> environment:prod    + release_candidate:rc_456),
# so their exclusive leases never overlap and both barrier ceremonies complete.
# This shows the kernel admits parallel execution when (and only when) the
# consequence/lease frontier proves the two actions cannot conflict.
#
# The trace-level action_id names the primary action: it carries the full
# predicate-validated witness/lease/capability ceremony. The secondary action's
# lifecycle and the cross-action invariants (barrier-before-execution,
# observed-after-execution, projection-anchored, lease no-overlap, closed
# terminality) are still enforced per the profile-agnostic invariant pass.
