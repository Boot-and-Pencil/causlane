# I-006 / P0-005: this bundle has a VERIFIED, APPLICABLE merge protocol, so its
# conflict-domain scopes (environment:staging, release_candidate:rc_123) are
# mergeable. A single mergeable-scope lease (environment) coexists fine, but two
# overlapping exclusive leases on an UNRELATED scope (queue:deploy) must still
# conflict — the merge protocol must not suppress conflicts globally. Replay and the
# scope-keyed Alloy assertion both reject this; the old global `some mergeable or`
# would have wrongly accepted it.
expected_replay_result: fail
expected_error_code: ConflictingLeases
