        resource: environment_write
        scope: environment:prod
        mode: exclusive
        holder_op_index: 0
        epoch: 1
        lease_event_id: evt_leases_granted
      - lease_id: lease_rc_900
        resource: release_candidate_write
        scope: release_candidate:rc_900
