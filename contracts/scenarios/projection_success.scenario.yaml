scenario_version: 0.1.0
scenario_id: projection_success
# M04.1 golden success: PROJECTION from an anchored observed truth.
#
# A RuntimeExecution producer (act_promote_900) commits observed truth; a
# ProjectionRead reader (act_project_900) emits a projection anchored to that
# observed_truth.committed. This isolates the projection-from-anchor happy path
# for a read predicate (I-003): the projection grounds its fact_kind/scope in the
# producer's attestation rather than self-asserting it. Mixed-predicate trace —
# the `actions` roster binds the reader to the ProjectionRead profile.
action_id: act_promote_900
predicate: release.promote_candidate
plan_hash: sha256:9999999999999999999999999999999999999999999999999999999999999999
subject:
  - key: release_candidate_id
    value: rc_900
  - key: target_environment
    value: prod
circumstance:
  - key: requested_by
    value: carol
  - key: reason
    value: promote canary
expected_replay_result: pass
formal_obligations: [I-002, I-003, I-008]
actions:
  - action_id: act_promote_900
    predicate: release.promote_candidate
  - action_id: act_project_900
    predicate: projection.read_release
events:
  # --- producer: commits observed truth for rc_900 in prod ---
  - event_id: evt_admitted
    kind: action.admitted
    action_id: act_promote_900
  - event_id: evt_planned
    kind: action.planned
    action_id: act_promote_900
    plan_hash: sha256:9999999999999999999999999999999999999999999999999999999999999999
