# I-007 P negative control (P1-001 interleaving lane): a drain fence is REQUESTED
# over environment:staging, and then a new exclusive lease is granted on that same
# scope while the drain is in progress. This invalid trace is refuted in two lanes:
#   - P: the keyed DrainBlocksNewMutableAdmission monitor fires (drain blocks new
#     mutable admission on the SAME scope) — the direction this control exists for.
#   - replay: the strict RuntimeExecution profile also rejects it, because a bare
#     drain.fence_requested from the New lifecycle state is a ForbiddenTransition
#     (the minimal trace omits the admit/plan/dispatch prefix). Hence the declared
#     replay code is Lifecycle, not the drain-overlap code that the fuller
#     drain_with_active_lease_invalid control (fence ACQUIRED over an active lease)
#     produces.
expected_replay_result: fail
expected_error_code: Lifecycle
formal_obligations: [I-007]
