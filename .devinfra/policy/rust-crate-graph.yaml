schema_version: sadave.rust_crate_graph_policy.v1
crates:
  - crate_name: causlane-core
    layer: kernel
  - crate_name: causlane-formal
    layer: formal
  - crate_name: causlane-contracts
    layer: contracts
  - crate_name: causlane-runtime
    layer: runtime
  - crate_name: causlane-replay
    layer: replay
  - crate_name: causlane-codegen
    layer: codegen
  - crate_name: causlane
    layer: facade
  - crate_name: causlane-cli
    layer: cli
allowed_edges:
