    to_layers: [kernel]
    allowed_external_classes: []
  - from_layer: formal
    to_layers: [formal]
    allowed_external_classes: []
  - from_layer: contracts
    to_layers: [contracts, kernel]
    allowed_external_classes: []
  - from_layer: runtime
    to_layers: [runtime, kernel]
    allowed_external_classes: [database, fs]
  - from_layer: replay
    to_layers: [replay, kernel, contracts]
    allowed_external_classes: []
  - from_layer: codegen
    to_layers: [codegen, contracts]
    allowed_external_classes: []
  - from_layer: facade
    to_layers: [facade, kernel, contracts, runtime, replay]
    allowed_external_classes: []
  - from_layer: cli
    to_layers: [cli, kernel, formal, contracts, replay, codegen]
    allowed_external_classes: []
