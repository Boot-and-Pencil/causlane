schema_version = 1
default_owner = "generic-runtime"

[[owners]]
owner = "generic-runtime"
paths = ["Cargo.toml", "Cargo.lock", "crates/**", "src/**", "tests/**", "benches/**"]
change_classes = ["code", "tests"]

[[owners]]
owner = "generic-runtime"
paths = ["docs/**", "evidence/**", ".devinfra/hopium/**", "Makefile.parallel-dev"]
