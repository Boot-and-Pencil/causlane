debounce_seconds = 5
coverage_idle_delay_seconds = 60

inputs = [
  "Cargo.toml",
  "Cargo.lock",
  "rust-toolchain.toml",
  ".cargo/config.toml",
  "crates/**/Cargo.toml",
  "crates/**/*.rs",
  "src/**/*.rs",
  "tests/**/*.rs",
  "benches/**/*.rs",
  "examples/**/*.rs",
  "build.rs",
  "**/build.rs",
  "schemas/**/*.proto",
  "schemas/**/*.graphql",
  "migrations/**",
]

ignored = [
  "target/**",
  "target/llvm-cov-target/**",
  ".agent-state/**",
  ".git/**",
  ".bacon-locations",
  "lcov.info",
  "coverage/**",
  "tmp/**",
  "dist/**",
  ".devinfra/logs/**",
  ".devinfra/run/**",
]
