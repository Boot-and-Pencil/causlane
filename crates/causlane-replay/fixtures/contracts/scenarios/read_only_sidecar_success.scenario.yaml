scenario_version: 0.1.0
scenario_id: read_only_sidecar_success
# M04.1 golden success: READ-ONLY SIDECAR.
#
# A RuntimeExecution PRODUCER (act_promote_123) runs the full barrier ceremony and
# commits observed truth. A ProjectionRead SIDECAR (act_sidecar_read) then projects
# that truth, anchored to the producer's observed_truth.committed, WITHOUT executing
# or committing anything (truth_commit_policy: disallowed). This is a mixed-predicate
# trace: the `actions` roster binds the sidecar action to the ProjectionRead
# predicate so the lifecycle reducer evaluates it against the read profile, while
# the producer keeps the full RuntimeExecution ceremony as the primary action.
action_id: act_promote_123
predicate: release.promote_candidate
plan_hash: sha256:a241276dc389e9197710cd415072e850036429799d636873f47ae8a1bc44d47b
subject:
  - key: release_candidate_id
    value: rc_123
  - key: target_environment
    value: staging
circumstance:
  - key: requested_by
    value: alice
  - key: reason
    value: ship it
expected_replay_result: pass
formal_obligations: [I-001, I-002, I-003, I-008]
actions:
  - action_id: act_promote_123
    predicate: release.promote_candidate
  - action_id: act_sidecar_read
    predicate: projection.read_release
events:
  # --- producer: full RuntimeExecution ceremony, commits observed truth ---
  - event_id: evt_admitted
    kind: action.admitted
    action_id: act_promote_123
  - event_id: evt_planned
    kind: action.planned
    action_id: act_promote_123
    plan_hash: sha256:a241276dc389e9197710cd415072e850036429799d636873f47ae8a1bc44d47b
  - event_id: evt_dispatch
    kind: dispatch.logged
    action_id: act_promote_123
    plan_hash: sha256:a241276dc389e9197710cd415072e850036429799d636873f47ae8a1bc44d47b
  - event_id: evt_leases_granted
    kind: constraint.lease_granted
    action_id: act_promote_123
    plan_hash: sha256:a241276dc389e9197710cd415072e850036429799d636873f47ae8a1bc44d47b
    leases:
      - lease_id: lease_env_staging
        resource: environment_write
        scope: environment:staging
        mode: exclusive
        holder_op_index: 0
        epoch: 1
        lease_event_id: evt_leases_granted
      - lease_id: lease_rc_123
        resource: release_candidate_write
        scope: release_candidate:rc_123
