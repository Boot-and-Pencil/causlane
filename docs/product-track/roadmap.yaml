project: causlane
generated_at: '2026-06-21'
positioning: Typed action semantics + consequence-aware dispatch for Rust systems.
principles:
- semantic control layer, not workflow engine
- generated truth chain
- single observed truth authority
- pure planning
- barrier before hard effects
- projection from anchor
- deny by default authz
- explicit merge protocols only
- formal claims require receipts
