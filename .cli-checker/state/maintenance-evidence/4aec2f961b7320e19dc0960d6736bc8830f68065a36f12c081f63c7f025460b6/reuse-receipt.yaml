planned_capabilities:
- capability_id: waiver_issue_apply_patch_bootstrap
  rationale: 'One fail-closed Codex apply-patch bootstrap for otherwise invalid .cli-checker.toml: allow only adding non-empty missing waiver issue fields; all other TOML values and waiver ordering/content must stay identical; candidate PolicyConfig must fully validate; support repository-root and multi-repository paths; deny every other invalid-baseline change. Positive and negative regressions required.'
- capability_id: blake3_content_identity_hardcut
  rationale: Complete the reviewed HOPIUM_REFINERY-438 hard cut of active content identities, checksum paths, schemas, DTOs, and tooling onto algorithm-bearing blake3:<hex> without dual-read, dual-write, or compatibility aliases.
- capability_id: rust_semantic_applicability_correction
  rationale: 'Preserve the HOPIUM_REFINERY-447 E01-E06 per-repository Rust semantic applicability correction: policy-driven relation coverage from source-owned dylint.toml, always-complete Symbol/Calls for Rust workspaces, optional relations only when declared, declared-empty relations as valid negative evidence, and standalone/multi-repository regressions.'
- capability_id: formal_doctor_ownership_regression
  rationale: In causlane, replace the stale product-CLI formal doctor smoke with a negative ownership regression so typed formal-environment authority remains solely cli-checker project formal doctor.
- capability_id: single_policy_authority_preservation
  rationale: Do not introduce a second policy authority, synthetic-issue compatibility reader, broad invalid-baseline bypass, or weakened quality gates while enabling the narrow waiver-issue bootstrap.
planned_entities:
- plan_id: extend_quality_plane_policy_compare_bootstrap
  kind: quality_plane
  disposition: extend
  proposed_owner: cli-checker/crates/cli-checker-core/src/quality_plane/policy_compare.rs
  existing_entity_id: rust:crates/cli-checker-core/src/quality_plane/policy_compare.rs#compare_policy_change
  replaced_entity_id: null
  rationale: 'compare_policy_change currently fail-closes any invalid current/candidate as unsupported_candidate_policy. Extend it (and only this quality-plane path) with one fail-closed bootstrap: invalid current solely for empty/missing waiver issue, candidate differs only by filling non-empty issue fields with identical ordering/other values, and validate_policy_config succeeds.'
- plan_id: reuse_policyconfig_validation_authority
